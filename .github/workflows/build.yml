name: Build & Release

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build (${{ matrix.name }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: macos-14,       name: macOS }
          - { os: windows-latest, name: Windows }
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      # JUCE はリポジトリに含めず FetchContent で取得する。build/_deps をキャッシュして
      # 毎回のダウンロード/展開を省く (キーに JUCE バージョンを含める)。
      - name: Cache JUCE (FetchContent)
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: build/_deps
          key: juce-8.0.12-${{ matrix.os }}

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DTRAKOVA_BUILD_TESTS=ON

      - name: Build
        run: cmake --build build --config Release --parallel

      # ── ユニットテスト (Localisation 含む全テスト) ──
      - name: Run unit tests (macOS)
        if: runner.os == 'macOS'
        run: |
          BIN=$(find build -type f -name TrakovaTests | head -1)
          echo "Running $BIN"
          "$BIN"

      - name: Run unit tests (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $bin = Get-ChildItem -Path build -Recurse -Filter TrakovaTests.exe | Select-Object -First 1
          Write-Host "Running $($bin.FullName)"
          & $bin.FullName
          if ($LASTEXITCODE -ne 0) { exit 1 }

      # ── リリース物のパッケージ化 (.app / .exe + ライセンス/マニュアル同梱) ──
      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: |
          APP=$(find build -type d -name "Trakova.app" | head -1)
          mkdir -p "Trakova-macOS"
          cp -R "$APP" "Trakova-macOS/"
          cp LICENSE THIRD_PARTY_LICENSES.txt Docs/MANUAL.html README.md "Trakova-macOS/"
          ditto -c -k --sequesterRsrc --keepParent "Trakova-macOS" "Trakova-macOS.zip"

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Path build -Recurse -Filter Trakova.exe | Select-Object -First 1
          New-Item -ItemType Directory -Force -Path "Trakova-Windows" | Out-Null
          Copy-Item $exe.FullName "Trakova-Windows/"
          Copy-Item LICENSE,THIRD_PARTY_LICENSES.txt,Docs/MANUAL.html,README.md "Trakova-Windows/"
          Compress-Archive -Path "Trakova-Windows" -DestinationPath "Trakova-Windows.zip" -Force

      - name: Upload build artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: Trakova-${{ matrix.name }}
          path: Trakova-*.zip
          if-no-files-found: error

  # タグ (v*) を push したときだけ GitHub Release を作成し、ビルド物を添付する
  release:
    name: Publish Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: artifacts/**/Trakova-*.zip
          generate_release_notes: true
          body: |
            Trakova ${{ github.ref_name }}

            本リリースは AGPL-3.0-or-later で配布されます。対応するソースコードは本リポジトリの
            同タグ (${{ github.ref_name }}) です。同梱ライブラリのライセンスは THIRD_PARTY_LICENSES.txt を参照してください。

            macOS 版は ad-hoc 署名のため、初回は Finder で右クリック →「開く」で起動してください。
